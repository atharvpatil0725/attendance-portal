<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 450px; border-top: 5px solid #1a73e8; }
        h2, .subtitle { text-align: center; }
        .subtitle { color: #5f6368; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; }
        .tabs { display: flex; border-bottom: 2px solid #e8eaed; margin-bottom: 25px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #5f6368; font-weight: 600; }
        .tab.active { color: #1a73e8; border-bottom: 3px solid #1a73e8; margin-bottom: -2px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 600; color: #5f6368; margin-bottom: 6px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 6px; background: #f8f9fa; font-size: 14px; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { padding: 12px; border-radius: 8px; text-align: center; color: white; font-weight: bold; font-size: 11px; }
        .bg-el { background-color: #1a73e8; } .bg-cl { background-color: #f4b400; } .bg-ml { background-color: #0f9d58; }
        .stat-box span { display: block; font-size: 20px; margin-top: 4px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; color: white;}
        .btn-primary { background-color: #1a73e8; }
        .btn-in { background-color: #34a853; margin-bottom: 10px; }
        .btn-out { background-color: #ea4335; }
        .pane { display: none; } .pane.active { display: block; }
        #msg { margin-top: 15px; padding: 12px; border-radius: 6px; text-align: center; display: none; font-size: 13px; }
        .msg-error { background: #fce8e6; color: #c5221f; } .msg-success { background: #e6f4ea; color: #137333; }
    </style>
</head>
<body>

<div class="card">
    <h2>Employee Portal</h2>
    <div class="subtitle">Secure Self-Service Hub</div>

    <!-- CREDENTIAL ENTRY GATES -->
    <div id="loginSection">
        <div class="form-group">
            <label>Employee Code</label>
            <input type="text" id="loginCode" placeholder="e.g., R16" required>
        </div>
        <div class="form-group">
            <label>Password (Mobile Number)</label>
            <input type="password" id="loginPassword" placeholder="10-digit mobile number" required>
        </div>
        <button class="btn-primary" onclick="submitPortalLogin()">Log In Securely</button>
    </div>

    <!-- MAIN CONSOLE SPACE -->
    <div id="portalContent" style="display:none;">
        <div class="form-group">
            <label>Logged In User</label>
            <input type="text" id="displayProfile" disabled style="font-weight:bold;">
        </div>

        <div class="dashboard">
            <div class="stat-box bg-el">EL Bal<span id="bal-el">0</span></div>
            <div class="stat-box bg-cl">CL Bal<span id="bal-cl">0</span></div>
            <div class="stat-box bg-ml">ML Bal<span id="bal-ml">0</span></div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('attendance')">Attendance</div>
            <div class="tab" onclick="switchTab('leave')">Leave Request</div>
        </div>

        <div id="attendancePane" class="pane active">
            <button class="btn-in" onclick="sendAttendance('IN')">Punch IN</button>
            <button class="btn-out" onclick="sendAttendance('OUT')">Punch OUT</button>
        </div>

        <div id="leavePane" class="pane">
            <div style="display:flex; gap:10px;" class="form-group">
                <div><label>Start</label><input type="date" id="startDate"></div>
                <div><label>End</label><input type="date" id="endDate"></div>
            </div>
            <div class="form-group">
                <label>Leave Type</label>
                <select id="leaveType">
                    <option value="CASUAL LEAVE">CASUAL LEAVE</option>
                    <option value="MEDICAL LEAVE">MEDICAL LEAVE</option>
                    <option value="EARNED LEAVE">EARNED LEAVE</option>
                </select>
            </div>
            <button class="btn-primary" onclick="sendLeave()">Submit Application</button>
        </div>
    </div>

    <div id="msg"></div>
</div>

<script>
    let sessionUser = null;

    // Force date strings to show as MM/DD/YYYY format for UI presentation hints if needed
    function showMessage(text, isError) {
        const msgDiv = document.getElementById('msg');
        msgDiv.className = isError ? 'msg-error' : 'msg-success';
        msgDiv.innerText = text; msgDiv.style.display = 'block';
    }

    async function submitPortalLogin() {
        const code = document.getElementById('loginCode').value.trim();
        const pass = document.getElementById('loginPassword').value.trim();
        
        if(!code || !pass) return showMessage("Please enter both Employee Code and Password.", true);
        showMessage("Verifying security parameters...", false);
        
        try {
            const res = await (await fetch('/api/portal', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
               body: JSON.stringify({ route: "portal_login", empCode: code, password: pass })
            })).json();

            if(res.status === "success") {
                sessionUser = res.data.profile;
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('portalContent').style.display = 'block';
                document.getElementById('displayProfile').value = `${sessionUser.empName} (${sessionUser.empCode})`;
                document.getElementById('bal-el').innerText = res.data.balances.EL_BAL || 0;
                document.getElementById('bal-cl').innerText = res.data.balances.CL_BAL || 0;
                document.getElementById('bal-ml').innerText = res.data.balances.ML_BAL || 0;
                document.getElementById('msg').style.display = 'none';

                // Prevent selecting past dates inside the calendar elements visually
                const d = new Date();
                const todayStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                document.getElementById('startDate').min = todayStr;
                document.getElementById('endDate').min = todayStr;
                
            } else { showMessage(res.message, true); }
        } catch(e) { showMessage("Database server validation error.", true); }
    }

    function switchTab(type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
        if (type === 'attendance') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('attendancePane').classList.add('active');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('leavePane').classList.add('active');
        }
    }

    async function sendAttendance(action) {
        showMessage("Getting GPS location...", false);
        
        const gpsOptions = {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        };

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const accuracy = pos.coords.accuracy;
            
            if (accuracy > 500) {
                showMessage(`GPS accuracy too low (±${Math.round(accuracy)}m). Move to open area and try again.`, true);
                return;
            }
            
            showMessage(`Syncing punch data... (±${Math.round(accuracy)}m accuracy)`, false);
            try {
                let perfectAddress = `Lat: ${pos.coords.latitude}, Lon: ${pos.coords.longitude}`;
                try {
                    const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                    const geoData = await geoRes.json();
                    if (geoData && geoData.display_name) {
                        perfectAddress = geoData.display_name;
                    }
                } catch (geoErr) {
                    console.error("Address lookup failed, using coordinates fallback", geoErr);
                }

                const res = await (await fetch('/api/portal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        route: "attendance",
                        action: action,
                        name: sessionUser.empName,
                        phone: sessionUser.phone || "",
                        address: perfectAddress,
                        latitude: pos.coords.latitude,
                        longitude: pos.coords.longitude,
                        accuracy: accuracy
                    })
                })).json();

                if(res.status === 'success') {
                    showMessage(`Successfully Punched ${action}!`, false);
                } else {
                    showMessage(res.message, true);
                }
            } catch (err) {
                showMessage("Server connection failed.", true);
            }
        }, (error) => {
            if(error.code === error.TIMEOUT) {
                showMessage("GPS Timeout: Please verify location is toggled ON or try again.", true);
            } else {
                showMessage("GPS access denied or unavailable.", true);
            }
        }, gpsOptions);
    }

    async function sendLeave() {
        const d = new Date();
        const todayStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        
        const startVal = document.getElementById('startDate').value;
        const endVal = document.getElementById('endDate').value;
        const leaveType = document.getElementById('leaveType').value;

        if (!startVal || !endVal) {
            showMessage("Please select both Start and End dates.", true);
            return;
        }
        if (startVal < todayStr) {
            showMessage("Access Denied: You cannot apply for a leave on a previous date.", true);
            return;
        }
        if (endVal < startVal) {
            showMessage("Invalid Range: End date cannot be before the start date.", true);
            return;
        }

        // Calculate leave length duration
        const sDate = new Date(startVal);
        const eDate = new Date(endVal);
        const totalRequestedDays = Math.ceil((eDate - sDate) / (1000 * 60 * 60 * 24)) + 1;

        // Fetch user values directly from current text element states
        const currentCL = parseInt(document.getElementById('bal-cl').innerText) || 0;
        const currentEL = parseInt(document.getElementById('bal-el').innerText) || 0;
        const currentML = parseInt(document.getElementById('bal-ml').innerText) || 0;

        // 📝 Default application status classification
        let leafRemark = "Valid Request"; 

        // 🔍 Check rules dynamically without terminating or blocking execution loop
        if (leaveType === "CASUAL LEAVE") {
            if (totalRequestedDays > 3 || currentCL <= 0 || currentCL < totalRequestedDays) {
                leafRemark = "Not Applicable";
            }
        } else if (leaveType === "EARNED LEAVE") {
            if (currentEL <= 0 || currentEL < totalRequestedDays) {
                leafRemark = "Not Applicable";
            }
        } else if (leaveType === "MEDICAL LEAVE") {
            if (currentML <= 0 || currentML < totalRequestedDays) {
                leafRemark = "Not Applicable";
            }
        }

        const payload = { 
            route: "leave", 
            empCode: sessionUser.empCode, 
            empName: sessionUser.empName, 
            phone: sessionUser.phone, 
            startDate: startVal, 
            endDate: endVal, 
            leaveType: leaveType,
            durationDays: totalRequestedDays,
            remark: leafRemark // Passes 'Not Applicable' classification directly into your database
        };
        
        showMessage("Processing data entry parameters...", false);

        try {
            const res = await (await fetch('/api/portal', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) })).json();
            
            if(res.status === 'success') {
                if (leafRemark === "Not Applicable") {
                    // 🔴 Shows up in bright RED styling on their layout screen
                    showMessage("Application Submitted (Remark: Not Applicable due to policy mismatch)", true);
                } else {
                    // 🟢 Shows up in traditional GREEN success formatting
                    showMessage("Application submitted successfully! Pending admin approval.", false);
                }
            } else {
                showMessage(res.message, true);
            }
        } catch(err) {
            showMessage("Failed to connect to application database.", true);
        }
    }
</script>
</body>
</html>
